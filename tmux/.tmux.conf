# 设置 tmux 颜色模式
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:TC"

# 状态栏美化
#set -g status-style "bg=#4c566a,fg=#d8dee9"
#setw -g window-status-current-style "fg=black,bg=#e5e9f0"
#set -g pane-active-border-style "fg=#08b472"
#set -g pane-border-style "fg=#32353b"
#####################################################>>>>

     # 常规 

#####################################################>>>>

# yazi图片预览
set -gq allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# 复制内容到系统剪贴板，优先适配 WSL/Wayland/X11
if-shell 'command -v clip.exe >/dev/null 2>&1' 'set -g @copy_command "clip.exe"'
if-shell -b '[ -z "#{@copy_command}" ] && command -v wl-copy >/dev/null 2>&1' 'set -g @copy_command "wl-copy"'
if-shell -b '[ -z "#{@copy_command}" ] && command -v xclip >/dev/null 2>&1' 'set -g @copy_command "xclip -i -selection clipboard"'

#####################################################>>>>

     # 主题 

#####################################################>>>>
# DRACULA主题
set -g @dracula-plugins  "ssh-session network cpu-usage battery git cwd"

# 添加ip显示 
set -g @dracula-show-network-interfaces true
set -g @dracula-network-show-ip true
set -g @dracula-network-hosts "1.1.1.1 8.8.8.8"
set -g @dracula-network-ethernet-label "󰈀 Eth"
set -g @dracula-network-offline-label "󰖪 offline"
set -g @dracula-network-wifi-label "󰘊 "

# 正常显示powerline
set -g @dracula-show-powerline true
set -g @dracula-show-edge-icons true
set -g @dracula-transparent-powerline-bg true
set -g @dracula-inverse-divider 
set -g @dracula-cwd-colors "light_purple dark_gray"

# status bar
set -g @dracula-show-flags true
# the default is 5, it can accept any number
set -g @dracula-refresh-rate 5 
set -g @dracula-border-contrast true #高对比度窗格
set -g @dracula-show-empty-plugins false #隐藏空插件

# left icons
set -g @dracula-show-left-icon "#h 🎮| #S | #W" #host name & session name & current window

# 电池
set -g @dracula-battery-label "♥ "

# cpu
set -g @dracula-cpu-display-load true
set -g @dracula-cpu-usage-label " " # CPU 负载。平均负载 – 是在给定的 1、5 和 15 分钟的时间段内计算的平均系统负载


# cwd 显示当前工作目录
# set -g @dracula-cwd-max-dirs "0"
# set -g @dracula-cwd-max-chars "0"

# 附加client信息
set -g @dracula-clients-minimum 1 #设置要显示的最小客户端数量

set -g @dracula-clients-singular client
set -g @dracula-clients-plural clients #一个客户端或多个客户端时设置标签


# 网络信息
set -g @dracula-network-hosts "1.1.1.1 8.8.8.8"
set -g @dracula-network-ethernet-label "󰈀 Eth"
set -g @dracula-network-offline-label "󰖪 offline"
set -g @dracula-network-wifi-label "󰘊 "

# ssh-session
set -g @dracula-show-ssh-only-when-connected true #没连接不显示
set -g @dracula-show-ssh-session-port true


# 天气,麻烦就关了
set -g @dracula-show-fahrenheit false


# 时间
set -g @dracula-show-timezone false
set -g @dracula-day-month true
set -g @dracula-military-time true


# 插件颜色分配
# per default available colors: white, gray, dark_gray, light_purple, dark_purple, cyan, green, orange, red, pink, yellow
# set -g @dracula-[plugin-name]-colors "[background] [foreground]"

#####################################################>>>>

     # 个人调配

#####################################################>>>>

# 状态栏间隔
set -g status-interval 3

# 让窗口编号从1开始
set -g base-index 1
setw -g pane-base-index 1

# 自动重命名窗口
setw -g automatic-rename on
set -g renumber-windows on

# 设置窗口标题
set -g set-titles on

# 窗口切换动画时间
set -g display-panes-time 1000
set -g display-time 1000

# 窗口管理快捷键
bind -n M-o new-window -c "#{pane_current_path}"
bind -n M-O break-pane
bind -n M-q kill-pane

# 窗口导航快捷键
bind -n M-Right next-window
bind -n M-Left previous-window

# 面板切换快捷键
# bind -n M-a select-pane -L
# bind -n M-s select-pane -D
# bind -n M-w select-pane -U
# bind -n M-d select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# 水平 & 垂直分屏
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# 启用 Vim 模式 & 鼠标支持
set -g mode-keys vi
set -g mouse on

# 复制模式增强（M-v 进入 copy-mode 并高亮）
unbind -n M-v
bind -n M-v copy-mode \; send-keys -X clear-selection \; send-keys -X start-of-line

# 复制内容到系统剪贴板（需要 xclip 或 wl-copy）
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection \; if-shell -F '#{@copy_command}' 'run-shell "tmux save-buffer - | #{@copy_command}"' 'display-message "No clipboard command found"'

# 前缀prefix修改
unbind c-b
set -g prefix 'c-s'

#####################################################>>>>

     # 插件 

#####################################################>>>>
# 使用 tmux-powerline 进行更好的状态栏显示
#set -g @plugin 'erikw/tmux-powerline'
#run-shell ~/.tmux/plugins/tmux-powerline/powerline.conf
if-shell '[ -f ~/.tmux/plugins/tmux-resurrect/resurrect.tmux ]' 'run ~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
if-shell '[ -f ~/.tmux/plugins/dracula/dracula.tmux ]' 'run ~/.tmux/plugins/dracula/dracula.tmux'
# 使用 tmux-resurrect 进行会话保存和恢复（需要安装 tmux plugin manager）
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-fzf'

# 添加 tmux-thumbs 插件以便快速选择和复制文本
set -g @plugin 'fcsonline/tmux-thumbs'
if-shell '[ -f ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux ]' 'run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux'
if-shell 'command -v clip.exe >/dev/null 2>&1' 'set -g @thumbs-command "echo -n {} | clip.exe"'
if-shell -b '[ -z "#{@thumbs-command}" ] && command -v wl-copy >/dev/null 2>&1' 'set -g @thumbs-command "echo -n {} | wl-copy"'
if-shell -b '[ -z "#{@thumbs-command}" ] && command -v xclip >/dev/null 2>&1' 'set -g @thumbs-command "echo -n {} | xclip -sel clip"'

# 适配vim 
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# 使用 Alt + a/s/w/d 无缝切换
bind -n M-a if-shell "$is_vim" "send-keys M-a"  "select-pane -L"
bind -n M-s if-shell "$is_vim" "send-keys M-s"  "select-pane -D"
bind -n M-w if-shell "$is_vim" "send-keys M-w"  "select-pane -U"
bind -n M-d if-shell "$is_vim" "send-keys M-d"  "select-pane -R"

# 插件列表依然需要包含这个（用于处理底层逻辑）
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'dracula/tmux'

set -gq allow-passthrough on 
set -g visual-activity off

if-shell '[ -f ~/.tmux/plugins/tpm/tpm ]' 'run ~/.tmux/plugins/tpm/tpm'
