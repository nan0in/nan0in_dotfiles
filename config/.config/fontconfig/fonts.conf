<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>

  <match target="font">
    <edit mode="assign" name="rgba"><const>rgb</const></edit>
    <edit mode="assign" name="hinting"><bool>true</bool></edit>
    <edit mode="assign" name="hintstyle"><const>hintslight</const></edit>
    <edit mode="assign" name="antialias"><bool>true</bool></edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>monospace</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>Maple Mono NF CN Medium</string> <string>MiSans</string>            </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>ui-monospace</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Maple Mono NF CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family" qual="any">
      <string>Menlo</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Maple Mono NF CN</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>sans-serif</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>Noto Sans</string>
      <string>MiSans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-cn</string>
    </test>
    <test name="family">
      <string>sans-serif</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>MiSans</string>
    </edit>
  </match>

  <match target="font">
    <test name="slant"><const>roman</const></test>
    <test compare="not_eq" name="slant" target="pattern"><const>roman</const></test>
    <edit mode="assign" name="matrix">
      <times>
        <name>matrix</name>
        <matrix><double>1</double><double>0.2</double><double>0</double><double>1</double></matrix>
      </times>
    </edit>
    <edit mode="assign" name="slant"><const>oblique</const></edit>
  </match>

  <dir>~/.fonts</dir>
  <dir>~/.local/share/fonts</dir>
</fontconfig>
