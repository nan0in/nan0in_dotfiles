# ==============================
# 窗口 / 工作区规则
# ==============================

windowrule {
    # 忽略应用的 maximize 请求，保持平铺体验一致。
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    # 修复部分 XWayland 浮动窗口拖拽时的焦点问题。
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    # 调整 hyprland-run 的弹出位置，避免挡住中心区域。
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = true
}

windowrule {
    name = picture-viewer
    match:class = ^(gwenview|swayimg)$
    
    float = true
    center = true
    # 使用表达式计算大小：占据屏幕宽度的 60%
    size = (monitor_w*0.6) (monitor_h*0.6)
}

windowrule {
    name = confine-game-pointer
    match:content = game
    match:fullscreen = true
    confine_pointer = true
}


