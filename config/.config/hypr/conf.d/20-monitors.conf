# ==============================
# 显示器配置
# ==============================
# 只有主显示器相关内容放这里，便于以后扩展外接屏/多配置方案。

# 协会方案
monitor = eDP-1, 2560x1600@240, 2560x0, 1
monitor = HDMI-A-1, 2560x1440@100, 0x0, 1 

# 寝室方案
# monitor = eDP-1, 2560x1600@240, 1920x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 0x0, 1 #

# 正常
# monitor = eDP-1, 2560x1600@240, 0x0, 1

# 对未单独声明的输出使用通用兜底规则。
# 这对临时外接屏、嵌套 Wayland 输出，或显示器名称变化时更稳妥。
monitor = , preferred, auto, 1

xwayland {
    force_zero_scaling = true
}
