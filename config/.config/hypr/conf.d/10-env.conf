# ==============================
# 会话环境变量
# ==============================
# 这一层专门放 env = ...
# 如果以后要排查主题、输入法、光标、Qt/GTK 行为，优先看这里。

env = LANG,zh_CN.UTF-8
env = LANGUAGE,zh_CN:en_US
env = LC_ALL,zh_CN.UTF-8

# 光标大小
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Wayland / Desktop 标识
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Qt 应用优先走 Wayland，同时允许必要时回退到 xcb。
# 如果后续要严格排查 Wayland 行为，可以临时改成纯 wayland。
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# 关闭 Qt Wayland 客户端的自带窗口装饰，交给 Hyprland 处理边框/圆角。
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# 在非 Plasma 会话中，为 Qt 应用提供 KDE 平台主题集成。
# 实际视觉风格主要由已安装的 KDE/Qt 平台主题组件和 ~/.config/kdeglobals 决定。
env = QT_QPA_PLATFORMTHEME,kde

# 输入法环境变量
# 这是 fcitx5 在 Qt / GTK / XWayland 应用里工作的关键链路。
env = QT_IM_MODULE,fcitx
env = GTK_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx

# Java 程序在平铺窗口管理器/Wayland 场景下常用的兼容项。
env = _JAVA_AWT_WM_NONREPARENTING,1

# 确保使用 NVIDIA 的 GBM 后端，而不是默认的
env = GBM_BACKEND,nvidia-drm

# 明确指定 GLX 供应商
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
