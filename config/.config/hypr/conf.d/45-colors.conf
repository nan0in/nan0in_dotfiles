# ==============================
# 颜色变量（集成 dms colors.conf）
# ==============================
# ambxst 不管理颜色变量和 group 着色，
# 此文件来自 dms setup 的 colors 模块，
# 补全 Hyprland group/groupbar 的颜色定义。

$primary = rgb(d0bcff)
$outline = rgb(948f99)
$error   = rgb(f2b8b5)

# ==============================
# general 边框颜色（使用变量）
# ==============================
# 注意：如果 50-look.conf 也定义了
# col.active_border / col.inactive_border，
# 最后加载的文件会覆盖。请确保此文件
# 在 50-look.conf 之前被 source。
general {
    col.active_border   = $primary
    col.inactive_border = $outline
}

# ==============================
# Group 边框颜色（dms 独有 - ambxst 不支持）
# ==============================
group {
    col.border_active          = $primary
    col.border_inactive        = $outline
    col.border_locked_active   = $error
    col.border_locked_inactive = $outline

    groupbar {
        col.active           = $primary
        col.inactive         = $outline
        col.locked_active    = $error
        col.locked_inactive  = $outline
    }
}
