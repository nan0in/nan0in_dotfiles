# ==============================
# 输入设备相关
# ==============================

input {
    # 键盘布局
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    # 鼠标焦点跟随
    follow_mouse = 1

    # 指针灵敏度；0 表示不额外修正
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

cursor {
    no_hardware_cursors = true
}

# 示例设备配置，保留你原来的 per-device 写法
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
