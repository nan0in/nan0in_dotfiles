# ==============================
# 会话启动项（exec-once）
# ==============================
# ambxst 已经由 ~/.local/share/ambxst/hyprland.conf 自己启动，
# 这里仅补充当前会话真正需要的守护进程。

# 把当前会话环境同步给 D-Bus / systemd --user 激活的图形程序。
# 否则部分通过桌面入口或后台服务拉起的 Qt 程序可能拿不到主题变量。
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE QT_QPA_PLATFORMTHEME QT_QPA_PLATFORM QT_WAYLAND_DISABLE_WINDOWDECORATION QT_IM_MODULE GTK_IM_MODULE XMODIFIERS
exec-once = systemctl --user import-environment WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE QT_QPA_PLATFORMTHEME QT_QPA_PLATFORM QT_WAYLAND_DISABLE_WINDOWDECORATION QT_IM_MODULE GTK_IM_MODULE XMODIFIERS

# 启动 fcitx5 输入法守护进程。
# 这一步和 10-env.conf 里的 IM 环境变量要配套使用。
exec-once = fcitx5 -d --replace
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# 延迟启动托盘类程序，避免在 ambxst/quickshell 的 systray 宿主就绪前注册失败。
# 这样在登录后更容易稳定显示 Wi-Fi、蓝牙和 cc-switch 图标。
exec-once = sh -c "sleep 1; nm-applet --indicator"

# 启动蓝牙托盘与图形管理入口。
# 没有这个 applet 时，在 Hyprland 里往往只能看到蓝牙服务存在，
# 但缺少稳定可用的图形入口来打开/管理蓝牙设备。
exec-once = sh -c "sleep 1; rfkill unblock bluetooth; bluetoothctl power on"
exec-once = sh -c "sleep 2; blueman-applet"

# cc-switch 依赖托盘宿主显示状态图标，因此也延迟到 systray 就绪后再拉起。
exec-once = sh -c "sleep 3; /usr/bin/cc-switch"
