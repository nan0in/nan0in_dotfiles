# ==============================
# 本机覆盖层
# ==============================
# 临时试验、单机差异化设置优先写这里。
# 由于它在最后加载，因此这里的内容优先级最高。


# ===== DEBUG: 启用日志（便于排查黑屏原因）=====
debug {
    disable_logs = false
}

# ===== 触控板手势 =====
gesture = 3, horizontal, workspace

gestures {
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.5
}

# ===== IDA / Hex-Rays 顶层窗口 =====
# 说明：
# - Hyprland 只能管理 IDA 创建出来的“顶层窗口”。
# - IDA 主界面内部的 dock/tab 面板不是桌面窗口，不能被 Hyprland 单独平铺。
# - 先默认让匹配到的 IDA 顶层窗口参与平铺；需要浮动时按 Super+Shift+V。
windowrule {
    name = ida-toplevels-by-class
    match:class = .*(ida|IDA|hexrays|Hex-Rays).*
    tile = true
}

windowrule {
    name = ida-toplevels-by-title
    match:title = .*(IDA|Hex-Rays|Pseudocode|Disassembly|Functions|Names|Strings|Structures|Enums|Imports|Exports|Segments|Output window|Graph view).*
    tile = true
}

# ===== 工作区浮动模式切换 =====
bind = $mainMod SHIFT, F, exec, ~/.config/hypr/scripts/toggle-floating-workspace.sh
