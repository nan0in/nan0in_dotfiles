# ==============================
# 本机覆盖层
# ==============================
# 临时试验、单机差异化设置优先写这里。
# 由于它在最后加载，因此这里的内容优先级最高。


# ===== DEBUG: 启用日志（便于排查黑屏原因）=====
debug {
    disable_logs = false
}

# ===== 触控板手势 =====
gesture = 3, horizontal, workspace

gestures {
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.5
}
