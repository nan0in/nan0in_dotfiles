# #######################################################################################
# Hyprland main entry file
#
# 这个文件尽量保持精简：
# - 只保留配置入口与加载顺序
# - 具体设置拆到 ~/.config/hypr/conf.d/*.conf
# - 继续兼容 ambxst 自动生成的配置
#
# 官方文档说明 `source` 支持多文件，并且按线性顺序解析：
# 前面的先加载，被 source 的文件接着加载，后面的最后加载。
# 因此这里的顺序会直接影响最终生效结果。
# #######################################################################################

autogenerated = 0

# 1) 加载常用变量，供后续所有模块复用。
source = ~/.config/hypr/conf.d/00-vars.conf

# 2) 先加载环境变量。
# 这样后续由 Hyprland 启动的程序，以及 ambxst 内部的 exec-once
# 都能继承同一套会话环境。
source = ~/.config/hypr/conf.d/10-env.conf

# 3) 保留 ambxst 作为基础配置来源。
source = ~/.local/share/ambxst/hyprland.conf

# 4) 加载本地模块化配置。
# 这些文件用于覆盖或补充 live 会话需要的行为。
source = ~/.config/hypr/conf.d/20-monitors.conf
source = ~/.config/hypr/conf.d/30-startup.conf
source = ~/.config/hypr/conf.d/40-input.conf

# dms: 颜色变量 + group/groupbar 着色（ambxst 不支持）
source = ~/.config/hypr/conf.d/45-colors.conf

source = ~/.config/hypr/conf.d/50-look.conf
source = ~/.config/hypr/conf.d/55-animations.conf
source = ~/.config/hypr/conf.d/60-binds.conf
source = ~/.config/hypr/conf.d/70-rules.conf

# 5) 最后给自己留一个本机覆盖层。
# 临时测试的配置可以优先写这里，避免污染前面的通用模块。
source = ~/.config/hypr/conf.d/90-local.conf
