# vim: ft=dosini
# blog-dark theme for fcitx5
# 毛玻璃磨砂风格，Tokyo Night 色系
# 背景: #1a1b26 半透明  高亮: #505aa0 蓝灰紫55%  文字: #a9b1d6  强调: #b0b8f0

[Metadata]
Name=Blog Dark
Version=2
Author=nan0in27
Description=Frosted glass dark theme inspired by personal blog (Tokyo Night)
ScaleWithDPI=True

[InputPanel]
Font=Noto Sans CJK SC 13
# 普通候选词颜色
NormalColor=#a9b1d6
# 选中候选词颜色
HighlightCandidateColor=#b0b8f0
# 输入拼音颜色（金色）
HighlightColor=#e0af68
# 高亮背景色（柔和蓝紫，仅作参考，实际由 highlight.png 决定）
HighlightBackgroundColor=#505aa0
Spacing=4
# 启用 KWin 毛玻璃模糊 —— 核心开关
EnableBlur=True
# 模糊遮罩：白色区域 = 模糊区域，形状决定圆角
BlurMask=blurmask.png
FullWidthHighlight=True
PageButtonAlignment="Last Candidate"

[InputPanel/BlurMargin]
Left=2
Right=2
Top=2
Bottom=2

[InputPanel/TextMargin]
Left=12
Right=12
Top=7
Bottom=7

[InputPanel/ContentMargin]
Left=4
Right=4
Top=4
Bottom=4

[InputPanel/Background]
# 半透明圆角背景（alpha ~63%，让 KWin 模糊透出）
Image=panel.png
Color=#1a1b2600
BorderColor=#414868
BorderWidth=0

[InputPanel/Background/Margin]
Left=14
Right=14
Top=14
Bottom=14

[InputPanel/Highlight]
Image=highlight.png
Color=#505aa08c
BorderColor=#7aa2f700
BorderWidth=0

[InputPanel/Highlight/Margin]
Left=8
Right=8
Top=5
Bottom=5

[InputPanel/PrevPage]
Image=prev.png

[InputPanel/PrevPage/ClickMargin]
Left=6
Right=6
Top=5
Bottom=5

[InputPanel/NextPage]
Image=next.png

[InputPanel/NextPage/ClickMargin]
Left=6
Right=6
Top=5
Bottom=5

[Menu]
Font=Noto Sans CJK SC 11
NormalColor=#a9b1d6
HighlightCandidateColor=#7aa2f7
Spacing=2

[Menu/Background]
Color=#1a1b26cc
BorderColor=#414868ff
BorderWidth=1

[Menu/Background/Margin]
Left=4
Right=4
Top=4
Bottom=4

[Menu/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#505aa08c
BorderColor=#7aa2f700
BorderWidth=0

[Menu/Highlight/Margin]
Left=8
Right=8
Top=4
Bottom=4

[Menu/Separator]
Color=#414868

[Menu/CheckBox]
Image=radio.png

[Menu/SubMenu]
Image=arrow.png

[Menu/TextMargin]
Left=8
Right=8
Top=5
Bottom=5
